name: Probe API GN (temporal)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ejecutar sondeo
        env:
          GN_TOKEN_ZATTIA: ${{ secrets.GN_TOKEN_ZATTIA }}
        run: node scripts/probe-api-gn.js
